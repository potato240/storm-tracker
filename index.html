<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test</title>
</head>
<body>
  <p id="status">Loading...</p>
  <script>
    fetch('/api/warnings?event=Special%20Weather%20Statement')
      .then(r => r.json())
      .then(data => {
        document.getElementById('status').textContent =
          'Got ' + data.features.length + ' warnings.';
      })
      .catch(err => {
        document.getElementById('status').textContent = 'Error: ' + err.message;
      });
  </script>
</body>
</html>
